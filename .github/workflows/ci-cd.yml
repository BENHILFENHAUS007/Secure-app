name: CI-CD

on:
  push:
    branches: ["main", "develop"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install backend deps
        run: |
          cd backend
          npm ci || npm install
      - name: Install frontend deps
        run: |
          cd frontend
          npm ci || npm install
      - name: Build backend
        run: |
          cd backend
          npm run build || true
      - name: Build frontend
        run: |
          cd frontend
          npm run build || true

  docker:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build compose stack
        run: docker compose config
